env_name: CodeReview-Env
version: 1.0.0
author: Thowfiq23
hf_space: Thowfiq23/CodeReview-Env
docker_image: codereview-env
max_steps: 3
description: A real-world PR code review environment. Evaluates an agent's ability to find bugs, security vulnerabilities, and logic flaws using deterministic AST and fuzzy keyword matching.
tasks:
  - task_1_bug
  - task_2_security
  - task_3_multi
action_model: ReviewAction
observation_model: CodeObservation
reward_range: [0.0, 1.0]
tags:
  - code-review
  - python
  - security
