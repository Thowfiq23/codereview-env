spec_version: 1
name: codereview-env
version: 3.0.0
description: "Execution-grounded software incident repair benchmark — 10 seeded tasks spanning code review, memory leaks, network timeout cascades, service restart gates, and DB migration ordering. Multi-component reward with 6-factor scoring."
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: task_1_pr
    description: "Fix 3 bugs in a user registration module: email regex, password length check, and MD5 hashing"
    steps: 10
    difficulty: medium
    grader: tasks.grade_task_1_pr

  - id: task_2_pr
    description: "Fix 3 arithmetic bugs in an order pricing engine: quantity multiply, discount direction, tax formula"
    steps: 10
    difficulty: medium-hard
    grader: tasks.grade_task_2_pr

  - id: task_3_pr
    description: "Fix 3 bugs in an async payment processor: hardcoded API key, sync/async, retry off-by-one"
    steps: 10
    difficulty: hard
    grader: tasks.grade_task_3_pr

  - id: task_4_pr
    description: "Fix 3 bugs in an LRU cache + serializer: missing move-to-end, missing eviction, None crash"
    steps: 10
    difficulty: hard
    grader: tasks.grade_task_4_pr

  - id: task_5_pr
    description: "Fix 3 algorithmic bugs in an analytics pipeline: EMA formula, population vs sample std, sliding window boundary"
    steps: 10
    difficulty: very-hard
    grader: tasks.grade_task_5_pr

  - id: task_6_pr
    description: "Fix 3 coupled bugs in a search ranking pipeline: tokenizer, relevance scorer, and ranker — fixing scorer alone regresses a passing test"
    steps: 10
    difficulty: expert
    grader: tasks.grade_task_6_pr

  - id: task_7_pr
    description: "Fix 3 config type bugs (string TIMEOUT/MAX_WORKERS, negative RETRY_DELAY) then call restart_service to bring the service online"
    steps: 10
    difficulty: expert
    grader: tasks.grade_task_7_pr

  - id: task_8_pr
    description: "Fix 3 migration bugs (lexicographic sort order, silent exceptions, single-statement execute) using inspect_logs for diagnosis, then call restart_service to apply migrations"
    steps: 10
    difficulty: expert
    grader: tasks.grade_task_8_pr

  - id: task_9_pr
    description: "Fix 3 memory-leak bugs (unbounded list cache, missing eviction, module-level accumulator) then call restart_service to recover from OOM-killed state"
    steps: 10
    difficulty: expert
    grader: tasks.grade_task_9_pr

  - id: task_10_pr
    description: "Fix 3 network-timeout cascade bugs (CONNECT_TIMEOUT two-sided trap, retry off-by-one, circuit breaker wrong threshold) — wrong timeout value fails even after correct retry logic"
    steps: 10
    difficulty: expert
    grader: tasks.grade_task_10_pr

action_model: AgentAction
observation_model: CodeObservation
state_model: ReviewState

observation_space:
  type: object
  schema: CodeObservation
  fields:
    task_id:         {type: string,  description: "Active task identifier"}
    context:         {type: string,  description: "Incident or PR description shown to the agent"}
    available_files: {type: array,   description: "Files present in the sandbox"}
    action_result:   {type: string,  description: "Output of last action or status message"}
    step_number:     {type: integer, description: "Steps consumed so far"}
    done:            {type: boolean, description: "True when episode has ended"}
    reward:          {type: float,   description: "Reward earned this step"}
    logs:            {type: array,   description: "Structured log entries [{ts, level, msg}] from last service operation"}
    service_status:  {type: object,  description: "Service health state for incident tasks (status, health details)"}

action_space:
  type: tool_call
  schema: AgentAction
  tools:
    - name: run_tests
      description: "Run pytest (full suite or specific path). Preferred over execute_command for testing."
      required_fields: [action_type]
      optional_fields: [path]
    - name: read_file
      description: "Read a file from the sandbox workspace cleanly"
      required_fields: [action_type, path]
    - name: search_codebase
      description: "Grep a regex pattern across all .py files in the workspace"
      required_fields: [action_type, pattern]
    - name: inspect_logs
      description: "Read service.log / migration.log generated by restart_service"
      required_fields: [action_type]
    - name: patch_file
      description: "Overwrite a source file with fixed content (triggers delta reward)"
      required_fields: [action_type, target_file, new_content]
    - name: restart_service
      description: "Run app_init.py to apply config/migration/memory-fix changes (tasks 7, 8 & 9)"
      required_fields: [action_type]
    - name: submit_fix
      description: "Declare fix complete with root-cause analysis; triggers 6-component terminal grading"
      required_fields: [action_type, root_cause]
    - name: submit_review
      description: "Backward-compatible alias for submit_fix"
      required_fields: [action_type]
      optional_fields: [root_cause, summary]
    - name: execute_command
      description: "Escape-hatch: run any bash command in the isolated sandbox"
      required_fields: [action_type, command]

scoring:
  reward_range: [-0.1, 1.0]
  success_threshold: 0.5
  score_formula: sum(rewards) / max_total_reward
  max_total_reward: 2.0
  terminal_components:
    test_quality:    {weight: 0.40, description: "Fraction of tests passing at submit time"}
    diagnosis:       {weight: 0.15, description: "root_cause keyword match against per-task ground truth"}
    efficiency:      {weight: 0.15, description: "optimal_steps / actual_steps (capped at 1.0)"}
    exploration:     {weight: 0.10, description: "Unique action types used / 5 (capped at 1.0)"}
    trap_avoidance:  {weight: 0.10, description: "1.0 - 0.2 * trap_count (floored at 0.0)"}
    submit_credit:   {weight: 0.10, description: "Fixed credit for reaching submit at all"}

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2

tags:
  - code-review
  - swe-bench
  - execution-sandbox
  - incident-repair
  - memory-leak
  - network-timeout
  - openenv
